services:
  - type: web
    name: expense-tracker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
        
  - type: pserv
    name: expense-tracker-db
    env: postgres
    plan: free
    ipAllowList: []
